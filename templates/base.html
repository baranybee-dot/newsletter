<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <title>Vates hírlevél-automatizáló</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">VATES<br><span>hírlevél-varázsló</span></div>
    <ol class="steps">
      {% for key, label in steps %}
        <li class="{% if active == key %}active{% endif %}">
          <a href="{{ url_for(key) }}">{{ loop.index }}. {{ label }}</a>
        </li>
      {% endfor %}
    </ol>
    <a class="logout" href="{{ url_for('logout') }}">Kilépés →</a>
  </aside>
  <main class="content">
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
  // Közös "vágólapra másolom" gomb: data-target a cél textarea id-ja
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('.copy-btn');
    if (!btn) return;
    var el = document.getElementById(btn.dataset.target);
    if (!el) return;
    el.select();
    navigator.clipboard.writeText(el.value).then(function () {
      var t = btn.textContent; btn.textContent = 'Másolva ✓';
      setTimeout(function () { btn.textContent = t; }, 1500);
    });
  });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
